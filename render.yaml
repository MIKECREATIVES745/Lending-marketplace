services:
  # Backend API (only - frontend will be on Vercel)
  - type: web
    name: lending-marketplace-api
    runtime: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        sync: false  # Will be set to Vercel URL after deployment
  
  # MongoDB (if using MongoDB Atlas, this section can be removed)
  - type: pserv
    name: mongodb
    runtime: python
    startCommand: echo "Use MongoDB Atlas instead"
