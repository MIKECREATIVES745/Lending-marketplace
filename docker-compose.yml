version: '3.8'

services:
  mongodb:
    image: mongo:5.0
    container_name: lending-marketplace-db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    networks:
      - lending-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lending-marketplace-api
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://admin:password@mongodb:27017/lending-marketplace?authSource=admin
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_here}
      NODE_ENV: development
      FRONTEND_URL: http://localhost:3000
    depends_on:
      - mongodb
    networks:
      - lending-network
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lending-marketplace-app
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - lending-network
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mongodb_data:

networks:
  lending-network:
    driver: bridge
